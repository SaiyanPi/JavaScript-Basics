<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asynchronous</title>
</head>
<body>
    <h3>When using the setInterval() method, you can specify function to be executed for each interval:
    </h3>
    <p id="demo"></p>

    <script>
        // setInterval(myFunction, 3000);
        // function myFunction() {
        //     document.getElementById("demo").innerHTML += "I appear every 3 seconds!<br>";
        // }

        setInterval(myTime, 1000);
        function myTime() {
            let d = new Date();
            document.getElementById("demo").innerHTML = 
            d.getHours() + ":" + d.getMinutes() + ":" + d.getSeconds();
        }
    </script>
</body>
</html>
