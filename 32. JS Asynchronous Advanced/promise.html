<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise</title>
</head>
<body>
    <h3>A Promise object represents the COMPLETION or FAILURE of an asynchronous operation.</h3>
    <p id="demo"></p>

    <script>
        function myDisplayer(some) {
            document.getElementById("demo").innerHTML = some;
        }
        
        // Create a Promise Object
        let myPromise = new Promise(function(resolve, reject) {
            ok = true; // Simulating a successful operation

            if(ok) {
                resolve("OK");
            } else {
                reject("Error");
            }
        })

        // Using then() to display the result
        myPromise.then(
            function(value) {myDisplayer(value);},  // success
            function(value) {myDisplayer(value);}   // failure
        )
    </script>
</body>
</html>
