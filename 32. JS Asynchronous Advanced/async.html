<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async</title>
</head>
<body>
    <h2>The async keyword before a function makes the function return a promise.
    <br>This is true even if you return a normal value.</h2>
    <p id="demo"></p>

    <script>
        function myDisplayer(some) {
            document.getElementById("demo").innerHTML = some;
        }

        async function greet() {
            return "Hello";
        }

        greet().then(
            function(value) {myDisplayer(value);},

            // since we expect a normal value(a normal response, not an error)
            // we can comment the second function that handles the failure case
            // function(value) {myDisplayer(value);}
        );
    </script>
</body>
</html>
