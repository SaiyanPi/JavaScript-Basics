<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>await</title>
</head>
<body>
    <h3>The await keyword makes a function pause the execution and wait for a resolved promise before it continues: <br>
    The await keyword can only be used inside an async function:</h3>
    <p id="demo"></p>

    <script>
        function myDisplayer(some) {
            document.getElementById("demo").innerHTML = some;
        }

        function step1() {
            return Promise.resolve("A");
        }

        async function run() {
            let value = await step1();
            myDisplayer(value);
        }

        run();
    </script>
</body>
</html>
