<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promises</title>
</head>
<body>
    <h2> 1️⃣ Waiting for a Timeout</h2>
    <h3>Example using Callback:</h3>
    <p id="demo1"></p>
    <h3>Example using Promise:</h3>
    <p id="demo2"></p>
    <hr>
    <h2> 2️⃣Waiting for a file</h2>
    <h3>Example using Callback:</h3>
    <p id="demo3"></p>
    <h3>Example using Promise:</h3>
    <p id="demo4"></p>

    <script>
        //-------------------------------- Using callback -----------------------------------
        setTimeout(function() {
            myFunction("I appear after 3 sec.");
        }, 3000);

        function myFunction(value) {
            document.getElementById("demo1").innerHTML = value;
        }

        //-------------------------------- Using Promise ------------------------------------
        let myPromise = new Promise( function(myResolve, myReject) {
            setTimeout(function() {
                myResolve("Promise resolved after 3 sec.");
            }, 3000);
        })

        myPromise.then(function(value) {
            document.getElementById("demo2").innerHTML = value;
        })

        //---------------------------------------------------------------------------------------------

        //-------------------------------- Using callback -----------------------------------
        function myDisplayer(some) {
            document.getElementById("demo3").innerHTML = some;
        }
        function getFile(myCallback) {
            let req = new XMLHttpRequest();
            req.open("GET", "mycar.html");
            req.onload = function() {
                if(req.status == 200) {
                    myCallback(this.responseText);
                } else {
                    myCallback("Error: " + req.status);
                }
            }
            req.send();
        }

        getFile(myDisplayer);

        //-------------------------------- Using Promise ------------------------------------
        function myDisplayer2(some) {
            document.getElementById("demo4").innerHTML = some;
        }

        let myPromise2 = new Promise(function(myResolve2, myReject2) {
            let req = new XMLHttpRequest();
            req.open("GET", "mycar.html");
            req.onload = function() {
                if(req.status == 200) {
                    
                    myResolve2(this.responseText);
                } else {
                    myReject2("Error: " + req.status);
                }
            }
            req.send();
        })

        myPromise2.then(
            function(value) { myDisplayer2(value); },
            function(error) { myDisplayer2(error); }
        );
    </script>
</body>
</html>
