<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>name</title>
</head>
<body>
    <h2>name Property:</h2>
    <b>Returns the name of the function.</b>
    <p id = "demo"></p>

    <script>
        // Case 1:
        function addNum(a, b) {
            return a + b;
        }
        document.getElementById("demo").innerHTML += "The name of the function is: " + addNum.name + "<br>";

        // Case 2:
        const mul = function multiplyNum(a, b) {
            return a * b;
        }
        document.getElementById("demo").innerHTML += "The name of the function is: " + mul.name + "<br>"
        
        //Case 3:
        function divNumber(a, b) {
            return a / b;
        }
        const div = divNumber;
        document.getElementById("demo").innerHTML += "The name of the function is: " + div.name + "<br>"

       // Case 4:
       function myCounter() {
            let counter = 0;
            return function increment() {
                counter ++;
                return counter;
            }
       }
       const add = myCounter();
       document.getElementById("demo").innerHTML += "The name of the function is: " + add.name + "<br>"
    </script>
</body>
</html>
