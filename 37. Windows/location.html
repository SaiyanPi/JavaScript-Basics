<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>windows</title>
</head>
<body>
    <h3>The window.location object</h3>
    <p id="demo"></p>

    <script>
        document.getElementById("demo").innerHTML = "The full URL of this page is:<br>" + window.location.href;
        document.getElementById("demo").innerHTML += "<br> Page hostname is: " + window.location.hostname;
        document.getElementById("demo").innerHTML += "<br>Page path is: " + window.location.pathname;
        document.getElementById("demo").innerHTML += "<br> The page protocol is: " + window.location.protocol;
        document.getElementById("demo").innerHTML += "<br> The URL port number of the current page is: " + window.location.port;
    </script>
</body>
</html>
