<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>JavaScript can secure better data quality when using getters and setters.</h2>
    <p><p>Getters and setters allow you to get and set properties via methods.</p></p>
    <h3>JS Getter</h3>
    <p id="demo1"></p>
    <h3>JS Setter</h3>
    <p id="demo2"></p>

    <script>
        const person = {
            firstName: "John",
            lastName: "Doe",
            country: "Nepal",
            get countryName() {
                return this.country.toUpperCase();
            },
            language: "",
            set lang(lan) {
                this.language = lan.toUpperCase();
            }
        };

        document.getElementById("demo1").innerHTML = person.countryName;    // NEPAL

        person.lang = "nepali";
        document.getElementById("demo2").innerHTML = person.language;   // NEPALI
    </script>
    
</body>
</html>
