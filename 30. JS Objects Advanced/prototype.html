<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prototype</title>
</head>
<body>
    <h2>The JavaScript prototype property allows you to add new properties to object constructors:</h2>
    <p id="demo1"></p>
    <h2>The JavaScript prototype property also allows you to add new methods to object constructors:</h2>
    <p id="demo2"></p>

    <script>
        function Person(firstName, lastName, age) {
            this.firstName = firstName;
            this.lastName = lastName;
            this.age = age;
        }
    
        // Add a new property to the person object constructor

        Person.prototype.nationality = "Nepali";

        const person1 = new Person("John", "Doe", 30);
        document.getElementById("demo1").innerHTML = "person1 nationality is " + person1.nationality;

        // Add a new method to the person object constructor
        Person.prototype.fullName = function() {
            return this.firstName + " " + this.lastName;
        };

        const person2 = new Person("Jane", "Doe", 25);
        document.getElementById("demo2").innerHTML = "person2 full name is " + person2.fullName();

    </script>
</body>
</html>
