<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>groupBy()</title>
</head>
<body>
    <h2>The Object.groupBy() method groups elements of an object according to string values returned from a callback function.</h2>
    <b>Map.groupBy</b>
    <p id="demo1"></p>
    <b>Object.groupBy</b>
    <p id="demo2"></p>

    <script>
        // Create an Array
        const fruits = [
            {name:"apples", quantity:300},
            {name:"bananas", quantity:500},
            {name:"oranges", quantity:200},
            {name:"kiwi", quantity:150}
        ];

        // Callback function to select low volumes 
        function myCallback({ quantity }) {
        return quantity > 200 ? "ok" : "low";
        }

        // Map groupBy() method to group the array elements
        const result = Map.groupBy(fruits, myCallback);

        // Display Results
        let text ="These fruits are Ok: <br>";
        for(let x of result.get("ok")) {
            text += x.name + " (" + x.quantity + ")<br>";
        }
        document.getElementById("demo1").innerHTML = text;

        //-----------------------------------------------------------------
        // Object groupBy() method to group the array elements
        const result2 = Object.groupBy(fruits, myCallback);

        // Display Results
        let text2 ="These fruits are Ok: <br>";
        
        for(let [x,y] of result2.ok.entries()) {
            text2 += y.name + " (" + y.quantity + ")<br>";
        }
        
        document.getElementById("demo2").innerHTML = text2;
    </script>
</body>
</html>
