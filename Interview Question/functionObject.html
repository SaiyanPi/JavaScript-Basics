<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Function, Object, and Method</h2>
    <p id="demo1"></p>
    <p id="demo2"></p>
    
    <script>
        let a = document.getElementById("demo1");
        let b = document.getElementById("demo2");

        // Function
        function add(a, b) {
            return a + b;
        }

        // Object
        const person = {
            name: "Saiyan",
            age: 30,
            country: "Nepal",

            // Method
            bio: function() {
                return "I am Super " + this.name;
            }
        }

        a.innerHTML += "1️⃣ typeof(function_name): " + typeof(add) + "<br>";
        a.innerHTML += "2️⃣ typeof(object_name): " + typeof(person) + "<br>";
        a.innerHTML += "3️⃣ typeof(object_name.method_name): " + typeof(person.bio) + "<br>";

        b.innerHTML += "3️⃣ typeof(object_name.method_name): " + person.bio() + "<br>";
        b.innerHTML += "3️⃣ typeof(object_name.method_name): " + typeof(person.bio()) + "<br>";



    </script>
</body>
</html>
