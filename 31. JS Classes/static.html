<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>static</title>
</head>
<body>
    <h2>You cannot call a static method on an object, only on an object class.</h2>
    <p id="demo"></p>

    <script>
        class Car {
            constructor(name) {
                this.name = name;
            }

            static hello() {
                return "Hello!!";
            }

            static greet(x) {
                return "Hello " + x.name;
            }
        }

        const myCar = new Car("Ford");

        //document.getElementById("demo").innerHTML = myCar.hello(); ❌
        document.getElementById("demo").innerHTML = Car.hello();

        //----------------------------------------------------------------------------
        document.getElementById("demo").innerHTML += "<br>" + Car.greet(myCar);
    </script>

</body>
</html>
