<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module</title>
</head>
<body>
    <p id="demo"></p>

    <script type="module">
        import { message, person } from "./message.js";
        import introduction from "./message.js";

        document.getElementById("demo").innerHTML = `${message()}, I'm ${person.fullName()}. <br>`;
        document.getElementById("demo").innerHTML += `${introduction()}.`;
    </script>
</body>
</html>
