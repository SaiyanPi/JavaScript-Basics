<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>insertBefore()</title>
</head>
<body>
    <h3>Creating new HTML Elements - insertBefore()</h3>
    <p>appendChild() method appended the new element as the last child of the parent.
    If you don't want that you can use the insertBefore() method:</p>

    <div id="div1">
        <p id="p1">This is a paragraph.</p>
        <p id="p2">This is another paragraph.</p>
    </div>

    <script>
        const para = document.createElement("p");
        const node = document.createTextNode("This is new.");
        para.appendChild(node);

        const element = document.getElementById("div1");
        const child = document.getElementById("p1");
        element.insertBefore(para, child);
    </script>
</body>
</html>
