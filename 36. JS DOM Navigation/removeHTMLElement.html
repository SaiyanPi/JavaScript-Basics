<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>remove()</title>
</head>
<body>
    <h3>Removing Existing HTML Elements</h3>
    <p>To remove an HTML element, use the remove() method:</p>

    <div>
        <p id="p1">This is a paragraph.</p>
        <p id="p2">This is another paragraph.</p>
    </div>

    <script>
        const elmnt = document.getElementById("p1"); elmnt.remove();
    </script>
</body>
</html>
