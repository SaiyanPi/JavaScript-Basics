<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Destructuring</title>
</head>
<body>
    <div>
        <h3>String Destructuring</h3>
        <i>One use for destructuring is unpacking string characters.</i>
        <p id="1"></p>

        <script>
            let name = "W3Schools";

            // Destructuring
            let [a1, a2, a3, a4, a5] = name;

            // Display Value
            document.getElementById("1").innerHTML = a1;    // W
        </script>
    </div>
    
</body>
</html>
