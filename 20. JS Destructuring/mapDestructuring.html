<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Maps</title>
</head>
<body>
    <div>
        <h3>Destructuring Maps</h3>
        <p id = "1"></p>

        <script>
            // Create a Map
            const fruits = new Map([
                ["apples", 500],
                ["bananas", 300],
                ["oranges", 200]
            ]);

            // Destructing
            let text = "";
            for (const [key, value] of fruits) {
                text += "<p>" + key + " is " + value;
            }

            // Display the Values
            document.getElementById("1").innerHTML = text;
        </script>
    </div>
    
</body>
</html>
